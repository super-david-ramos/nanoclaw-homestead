name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install host deps (Bun)
        run: bun install --frozen-lockfile

      - name: Install agent-runner deps (Bun)
        working-directory: container/agent-runner
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format:check

      - name: Typecheck host
        run: bun run typecheck

      - name: Typecheck container
        run: bunx tsc -p container/agent-runner/tsconfig.json --noEmit

      - name: Host tests
        run: bun test --isolate

      - name: Container tests
        working-directory: container/agent-runner
        run: bun test
